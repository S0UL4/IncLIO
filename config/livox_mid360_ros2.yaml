# config/livox_mid360_ros2.yaml
# IncLIO config for Livox Mid-360 used via ROS2 live topics.

preprocess:
  lidar_type: 1
  scan_line: 4
  time_scale: 1e-6           # Livox offset_time is in nanoseconds

mapping:
  extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
  extrinsic_R: [ 1, 0, 0,
                 0, 1, 0,
                 0, 0, 1 ]

point_filter_num: 4
max_iteration: 10

with_ui: false

max_static_acce_var: 0.05
max_static_gyro_var: 0.01
imu_init_time: 3.0
