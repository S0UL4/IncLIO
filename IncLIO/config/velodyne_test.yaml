preprocess:
  lidar_type: 2                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
  scan_line: 128
  time_scale: 1e-3             # 兼容不同数据集的时间单位，仅对Velodyne LiDAR(lidar_type=2)生效

mapping:
  extrinsic_T: [ -0.488, 0.0, 0.385 ]
  extrinsic_R: [ 0, -1, 0,
                1,            0, 0,
                0, 0, 1 ]

point_filter_num: 10
max_iteration: 3
imu_has_gravity: true
with_ui: true

max_static_acce_var: 0.25
max_static_gyro_var: 0.5

imu_init_time: 10.0