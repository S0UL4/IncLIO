preprocess:
  lidar_type: 1                # 1=Livox, 2=Velodyne, 3=Ouster
  scan_line: 4                 # Mid-360 has 4 scan lines
  time_scale: 1e-6             # Livox offset_time is in nanoseconds, handled in parser

mapping:
  # IMU-LiDAR extrinsics (Livox Mid-360 built-in IMU)
  # Adjust these to match your sensor mounting
  extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
  extrinsic_R: [ 1, 0, 0,
                 0, 1, 0,
                 0, 0, 1 ]

point_filter_num: 4
max_iteration: 10
with_ui: true

max_static_acce_var: 0.05
max_static_gyro_var: 0.01

imu_init_time: 3.0

